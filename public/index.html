<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Auth Frontend</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>ログイン</h1>
        <p class="description">未登録ユーザーは同じフォームから新規登録されます。</p>
        <form id="login-form">
          <label for="username">ユーザー名</label>
          <input id="username" name="username" type="text" required />

          <label for="password">パスワード</label>
          <input id="password" name="password" type="password" required />

          <button type="submit">送信</button>
        </form>
        <p id="message" class="message" aria-live="polite"></p>
      </section>

      <section id="profile-section" class="card hidden">
        <h2>ログイン中ユーザー</h2>
        <dl>
          <div>
            <dt>ID</dt>
            <dd id="profile-id"></dd>
          </div>
          <div>
            <dt>ユーザー名</dt>
            <dd id="profile-username"></dd>
          </div>
          <div>
            <dt>ロール</dt>
            <dd id="profile-role"></dd>
          </div>
          <div>
            <dt>ステータス</dt>
            <dd id="profile-status"></dd>
          </div>
        </dl>
        <button id="logout-button" type="button">ログアウト</button>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
