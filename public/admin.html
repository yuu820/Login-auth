<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理画面 - Login Auth</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>管理画面</h1>
        <p class="description">管理者ユーザーのみ利用できます。</p>
        <div class="toolbar">
          <a href="/" class="button-link">ログイン画面へ戻る</a>
          <button id="refresh-button" type="button">再読み込み</button>
          <button id="logout-button" type="button">ログアウト</button>
        </div>
        <p id="message" class="message" aria-live="polite"></p>
      </section>

      <section class="card">
        <h2>ユーザー一覧</h2>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ユーザー名</th>
                <th>ロール</th>
                <th>ステータス</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="users-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/admin.js"></script>
  </body>
</html>
